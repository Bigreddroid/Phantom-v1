name: Phantom Scheduler

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min, 24/7
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Fire dispatch
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/dispatch" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code} in %{time_total}s\n" || true
