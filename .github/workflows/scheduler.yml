name: Phantom Scheduler

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-phantom:
    runs-on: ubuntu-latest
    steps:
      - name: Get current IST time
        id: time
        run: |
          HOUR=$(TZ='Asia/Kolkata' date +%-H)
          MINUTE=$(TZ='Asia/Kolkata' date +%-M)
          DOW=$(TZ='Asia/Kolkata' date +%u)
          echo "hour=$HOUR" >> $GITHUB_OUTPUT
          echo "minute=$MINUTE" >> $GITHUB_OUTPUT
          echo "dow=$DOW" >> $GITHUB_OUTPUT
          echo "IST: $(TZ='Asia/Kolkata' date)"

      # ── Mentions — every 30 min, 24/7 ─────────────────────────────────────
      - name: Mentions
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/mentions" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" || true

      # ── Engagement — every 30 min, 24/7 (day=full, night=likes only) ──────
      - name: Engagement
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/engage" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" || true

      # ── Tweets — 4x/day: 7:30am, 12:30pm, 6:30pm, 9:30pm IST ────────────
      - name: Tweet
        if: |
          ${{
            fromJson(steps.time.outputs.minute) >= 28 &&
            fromJson(steps.time.outputs.minute) <= 32 &&
            (
              fromJson(steps.time.outputs.hour) == 7  ||
              fromJson(steps.time.outputs.hour) == 12 ||
              fromJson(steps.time.outputs.hour) == 18 ||
              fromJson(steps.time.outputs.hour) == 21
            )
          }}
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/tweet" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" || true

      # ── Watchdog — every hour (fires at :00) ─────────────────────────────
      - name: Watchdog
        if: ${{ fromJson(steps.time.outputs.minute) < 30 }}
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/watchdog" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" || true

      # ── Follow — 3x/day: 9:30am, 3:30pm, 8:30pm IST ────────────────────
      - name: Follow
        if: |
          ${{
            fromJson(steps.time.outputs.minute) >= 28 &&
            fromJson(steps.time.outputs.minute) <= 32 &&
            (
              fromJson(steps.time.outputs.hour) == 9  ||
              fromJson(steps.time.outputs.hour) == 15 ||
              fromJson(steps.time.outputs.hour) == 20
            )
          }}
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/follow" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" || true

      # ── Threads — Mon & Thu 2:30pm IST ───────────────────────────────────
      - name: Thread
        if: |
          ${{
            fromJson(steps.time.outputs.minute) >= 28 &&
            fromJson(steps.time.outputs.minute) <= 32 &&
            fromJson(steps.time.outputs.hour) == 14 &&
            (fromJson(steps.time.outputs.dow) == 1 || fromJson(steps.time.outputs.dow) == 4)
          }}
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/thread" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" || true
